name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run smoke tests
        run: pytest -q
      - name: Smoke-run the static demo
        run: python run_experiment.py
      - name: Smoke-run the sieve demo
        run: python run_sieve.py
      - name: Smoke-run the temporal demo
        run: python run_temporal.py
      - name: Smoke-run the WL certification
        run: python run_wl.py
      - name: Smoke-run the LANL probe (synthetic slice)
        run: python run_lanl.py --smoke
